<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Access</title>

<style>
  body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
  }

  .card{
    width:90%;
    max-width:420px;
    background:#1c1c1c;
    padding:25px;
    border-radius:20px;
    text-align:center;
  }

  button, a{
    display:block;
    width:100%;
    padding:15px;
    margin-top:12px;
    border-radius:12px;
    border:none;
    font-size:16px;
    cursor:pointer;
    text-decoration:none;
  }

  .copy{
    background:#4CAF50;
    color:white;
  }

  .wifi{
    background:#2196F3;
    color:white;
  }

  .qr{
    background:#333;
    color:white;
  }

  img{
    margin-top:15px;
    width:220px;
    border-radius:12px;
  }
</style>
</head>

<body>

<div class="card">
  <h2>Connettiti al WiFi</h2>

  <p><b>SSID:</b> FRITZ!Box 7590 SL</p>

  <button class="copy" onclick="copyPassword()">Copia password</button>

  <a class="wifi" href="App-Prefs:root=WIFI">Apri impostazioni WiFi</a>

  <button class="qr" onclick="toggleQR()">Mostra QR</button>

  <img id="qr" style="display:none">

</div>

<script>

const ssid = "FRITZ!Box 7590 SL";
const password = "95963770202872562969";

// copia password
function copyPassword(){
  navigator.clipboard.writeText(password);
  alert("Password copiata");
}

// QR WiFi
const qrUrl =
"https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
encodeURIComponent(`WIFI:T:WPA;S:${ssid};P:${password};;`);

document.getElementById("qr").src = qrUrl;

// mostra/nasconde QR
function toggleQR(){
  const qr = document.getElementById("qr");
  qr.style.display = qr.style.display === "none" ? "block" : "none";
}

</script>

</body>
</html>
