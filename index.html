<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Access</title>

<style>
  body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
  }

  .card{
    width:90%;
    max-width:420px;
    background:#1c1c1c;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  h2{
    margin-top:0;
  }

  p{
    margin:8px 0 15px 0;
    opacity:0.85;
  }

  button{
    display:block;
    width:100%;
    padding:15px;
    margin-top:12px;
    border-radius:12px;
    border:none;
    font-size:16px;
    cursor:pointer;
    box-sizing:border-box;
    transition:0.2s;
  }

  button:active{
    transform:scale(0.98);
  }

  .copy{
    background:#4CAF50;
    color:white;
  }

  .wifi{
    background:#2196F3;
    color:white;
  }

  .qr{
    background:#333;
    color:white;
  }

  img{
    margin-top:15px;
    width:220px;
    border-radius:12px;
    display:none;
  }
</style>
</head>

<body>

<div class="card">
  <h2>WiFi Access</h2>

  <p><b>SSID:</b> FRITZ!Box 7590 SL</p>

  <button class="copy" onclick="copyPassword()">Copia password</button>

  <button class="wifi" onclick="openWifi()">Apri impostazioni WiFi</button>

  <button class="qr" onclick="toggleQR()">Mostra QR</button>

  <img id="qr" alt="QR WiFi">
</div>

<script>

const ssid = "FRITZ!Box 7590 SL";
const password = "95963770202872562969";

/* COPIA PASSWORD */
function copyPassword(){
  navigator.clipboard.writeText(password);
  alert("Password copiata");
}

/* APRI WIFI SETTINGS */
function openWifi(){
  const ua = navigator.userAgent;

  if (/iPhone|iPad|iPod/i.test(ua)) {
    // iOS shortcut (può variare in base alla versione)
    window.location.href = "App-Prefs:root=WIFI";
  } else {
    // Android fallback
    window.location.href = "intent://settings/#Intent;action=android.settings.WIFI_SETTINGS;end";
  }
}

/* QR GENERATO DINAMICAMENTE */
const qrUrl =
"https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
encodeURIComponent(`WIFI:T:WPA;S:${ssid};P:${password};;`);

document.getElementById("qr").src = qrUrl;

/* MOSTRA / NASCONDI QR */
function toggleQR(){
  const qr = document.getElementById("qr");

  if(qr.style.display === "block"){
    qr.style.display = "none";
  } else {
    qr.style.display = "block";
  }
}

</script>

</body>
</html>
